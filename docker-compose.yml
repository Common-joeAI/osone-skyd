version: "3.9"

services:

  llama:
    build: ./llama
    container_name: osone-llama
    restart: unless-stopped
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - /mnt/user/osone/models:/models:ro
    networks:
      - osone

  skyd:
    build: ./skyd
    container_name: osone-skyd
    restart: unless-stopped
    depends_on:
      - llama
    env_file:
      - .env
    environment:
      - LLAMA_URL=${LLAMA_URL:-http://llama:8080}
      - GITHUB_REPO=${GITHUB_REPO}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - PLEX_URL=${PLEX_URL}
      - RADARR_URL=${RADARR_URL}
      - SONARR_URL=${SONARR_URL}
      - AETHORIA_URL=${AETHORIA_URL}
    volumes:
      - skyd-lang:/usr/local/skyd/lang
      - skyd-logs:/var/log
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - /mnt/user/Data/Movies:/mnt/user/Data/Movies:ro
    networks:
      - osone
      - osociety
    pid: host
    privileged: false

  gui:
    build: ./gui
    container_name: osone-gui
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - llama
    environment:
      - LLAMA_URL=http://llama:8080
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - /etc/osone:/etc/osone
      - skyd-logs:/var/log/skyd:ro
      - /var/run/docker.sock:/var/run/docker.sock:rw
    ports:
      - "8000:8000"
    networks:
      - osone



  watchdog:
    build: ./watchdog
    container_name: osone-watchdog
    restart: unless-stopped
    depends_on:
      - skyd
      - llama
    env_file:
      - .env
    environment:
      - SKYD_API=http://osone-skyd:8080
      - LLAMA_URL=${LLAMA_URL:-http://llama:8080}
    volumes:
      - skyd-logs:/watch
      - /mnt/user/osone-docker/skyd:/skyd-src:ro
      - /var/run/docker.sock:/var/run/docker.sock:rw
    networks:
      - osone

  cloudflared:
    image: cloudflare/cloudflared:2026.5.0
    container_name: osone-cloudflared
    restart: unless-stopped
    volumes:
      - /mnt/user/osone-docker/cloudflared:/etc/cloudflared:ro
    extra_hosts:
      - "localhost:172.22.0.1"
    command: tunnel --no-autoupdate --protocol http2 --config /etc/cloudflared/config.yml run --token ${CLOUDFLARE_TOKEN}
    networks:
      - osone
  landing:
    image: nginx:alpine
    container_name: osone-landing
    restart: unless-stopped
    volumes:
      - /mnt/user/osone/web:/usr/share/nginx/html:ro
      - /mnt/user/osone-docker/landing/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "9000:9000"

volumes:
  skyd-lang:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/user/osone/skyd/lang
  skyd-logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/user/osone/skyd/logs

networks:
  osone:
    driver: bridge
  osociety:
    external: true
    name: minecraft_osociety